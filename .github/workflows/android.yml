name: Android Cloud Compiler Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure Java JDK 17 Environment
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Prepare Debug Keystore
      env:
        DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
      run: |
        if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
          echo "$DEBUG_KEYSTORE_BASE64" | base64 --decode --ignore-garbage > debug.keystore
        elif [ -f "debug.keystore.base64" ]; then
          base64 --decode --ignore-garbage debug.keystore.base64 > debug.keystore
        else
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "cn=Unknown, ou=Unknown, o=Unknown, c=Unknown"
        fi

    - name: Execute Local Gradle Compile
      run: gradle assembleDebug

    - name: Export Target Package Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: shorts-blocker-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
